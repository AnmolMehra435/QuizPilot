<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">📝 Quiz</h2>

    <form method="post" action="/student/submit">

        <input type="hidden" name="quizId" th:value="${quizId}"/>

        <div class="card mb-3 p-3" th:each="q : ${questions}">
            <h5 th:text="${q.questionText}"></h5>

            <div class="form-check">
                <input class="form-check-input" type="radio" th:name="'q_' + ${q.id}" value="1">
                <label class="form-check-label" th:text="${q.option1}"></label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" th:name="'q_' + ${q.id}" value="2">
                <label class="form-check-label" th:text="${q.option2}"></label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" th:name="'q_' + ${q.id}" value="3">
                <label class="form-check-label" th:text="${q.option3}"></label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" th:name="'q_' + ${q.id}" value="4">
                <label class="form-check-label" th:text="${q.option4}"></label>
            </div>
        </div>

        <button class="btn btn-primary w-100">Submit Quiz</button>
    </form>
</div>

</body>
</html>
