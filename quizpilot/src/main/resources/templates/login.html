<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 400px; background: white; color: black;">

        <h3 class="text-center mb-3">QuizPilot</h3>

        <form method="post" action="/login">
            <input class="form-control mb-3" name="username" placeholder="Username" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

            <button class="btn btn-success w-100">Login</button>
        </form>

        <p class="text-danger text-center mt-2" th:text="${error}"></p>

        <a href="/register" class="text-center d-block mt-2">Create Account</a>
    </div>
</div>

</body>
</html>
